name: Build

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install cross-compile toolchain
        run: sudo apt-get install -y gcc-mingw-w64-x86-64 llvm

      - name: Build
        run: |
          cargo +nightly build \
            --features portable-release \
            --target x86_64-pc-windows-gnu \
            --release

      - name: Strip binary
        run: |
          llvm-strip --strip-all \
            target/x86_64-pc-windows-gnu/release/ftlman.exe

      - name: Package
        run: |
          mkdir -p ftlman/mods
          cp target/x86_64-pc-windows-gnu/release/ftlman.exe ftlman/
          7z a ftlman-x86_64-pc-windows-gnu.zip ftlman

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ftlman-windows
          path: ftlman-x86_64-pc-windows-gnu.zip
